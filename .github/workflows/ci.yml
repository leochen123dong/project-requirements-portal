# CI: lint + typecheck + unit tests on every PR / push to main.
# E2E only runs when secrets E2E_SUPABASE_URL + E2E_SUPABASE_ANON_KEY are
# configured (on protected branches / repos that host a staging Supabase).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Strip empty-version entries from lock
        working-directory: web
        run: python3 scripts/strip-empty-versions.py

      - run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # Only run E2E when Supabase secrets are present (otherwise the gated
  # `opportunity-to-project.spec.ts` would skip; still useful to verify the
  # mock-mode UI on a clean CI box).
  e2e:
    needs: lint-and-test
    if: ${{ secrets.E2E_SUPABASE_URL && secrets.E2E_SUPABASE_ANON_KEY }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Strip empty-version entries from lock
        working-directory: web
        run: python3 scripts/strip-empty-versions.py

      - run: npm ci --no-audit --no-fund

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run Playwright E2E
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
