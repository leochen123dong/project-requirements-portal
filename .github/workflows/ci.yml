# CI: lint + typecheck + unit tests + E2E on every PR / push to main.
# The Supabase-gated e2e test (`opportunity-to-project.spec.ts`) detects
# missing E2E_SUPABASE_URL / E2E_SUPABASE_ANON_KEY secrets via test.skip() —
# so the e2e job always runs and gracefully skips the Supabase test when
# the repo hasn't configured staging Supabase credentials. We can't gate
# the job itself with `if: ${{ secrets.X }}` because GitHub Actions
# rejects secret references in job-level `if:` (security: secrets must
# not be evaluated in expressions that appear in logs).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  e2e:
    needs: lint-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Passed as env (NOT referenced in `if:`) so GHA accepts the workflow.
      # When secrets are missing, these resolve to empty strings and the
      # Supabase-gated Playwright spec calls test.skip() at runtime.
      E2E_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
      E2E_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install --no-audit --no-fund

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run Playwright E2E
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
